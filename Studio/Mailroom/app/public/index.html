<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Mailroom</title>
<style>
:root{--frame:#eee6de;--card:#fcfaf5;--line:rgba(0,0,0,.22);--head:#1a1a1a;--body:#2d1a1b;--muted:#7a5c5e;--link:#8b4a2f;--pink:#f39ec2;--pinksoft:#f9d4e3;--violet:#a186bc;--amber:#fecc86;--green:#c1d17c;--cream:#ffeec6;--taskbg:#fef0d0;--ok:#5d6e54}
@media(prefers-color-scheme:dark){:root{--frame:#1e1a18;--card:#2a2422;--line:rgba(255,255,255,.16);--head:#f3ece4;--body:#e8dcd6;--muted:#b09490;--link:#e0a184;--pinksoft:#3e2a34;--taskbg:#3a2f1e;--cream:#4a4230}}
*{box-sizing:border-box}
body{margin:0;background:var(--frame);color:var(--body);font-family:"Karla","Segoe UI",system-ui,sans-serif;padding:26px 16px 60px}
.wrap{max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
h1{font-family:"AT King","Iowan Old Style",Georgia,serif;font-size:28px;margin:0;color:var(--head)}
.sub{font-family:"Roboto Mono",ui-monospace,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:2px 0 0}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.stat .n{font-family:"AT King",Georgia,serif;font-size:26px;line-height:1;color:var(--head)}
.stat .l{font-family:"Roboto Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:5px}
.stat.r{border-top:3px solid var(--pink)}.stat.t{border-top:3px solid var(--amber)}.stat.a{border-top:3px solid var(--green)}
.tabs{display:flex;gap:7px;flex-wrap:wrap}
.tab{font-family:"Roboto Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--card);color:var(--body);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
.tab[aria-selected=true]{background:var(--pink);color:#1a1a1a;font-weight:700}
.pane{display:none;flex-direction:column;gap:9px}.pane.on{display:flex}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;border-left:4px solid var(--muted)}
.card.reply{border-left-color:var(--pink)}.card.task{border-left-color:var(--amber)}
.card.done{opacity:.5}.card.done .who{text-decoration:line-through}
.who{font-weight:700;color:var(--head)}
.subj{margin:5px 0 4px;font-size:13.5px}.note{margin:0;font-size:12.5px;color:var(--muted)}
.acct{font-family:"Roboto Mono",monospace;font-size:9px;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;color:#3a2b2b}
.acct.personal{background:var(--green)}.acct.support{background:var(--amber)}.acct.alyssa{background:var(--pink)}.acct.wellness{background:var(--violet);color:#fff}
.btn{font-family:"Roboto Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;background:var(--pink);color:#1a1a1a}
.btn.ghost{background:var(--taskbg);color:#9a6a1e}
.btn:disabled{opacity:.55;cursor:progress}
.blk{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px 14px 12px}
.blkh{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);margin-bottom:2px}
.blkh b{flex:1;font-family:"AT King",Georgia,serif}
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.row:last-child{border-bottom:none}
.row.keep{opacity:.4;text-decoration:line-through}
.row input,.tick{accent-color:var(--link);width:16px;height:16px;flex:none;cursor:pointer}
.rs{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rf{font-size:10.5px;color:var(--muted)}
.lbl{font-family:"Roboto Mono",monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.keepnote{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:12.5px}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:var(--head);color:var(--frame);font-family:"Roboto Mono",monospace;font-size:12px;padding:11px 18px;border-radius:999px;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:#8a1c0a;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div><h1>The Mailroom</h1><p class="sub" id="sub">loading…</p></div>
  <div class="stats">
    <div class="stat r"><div class="n" id="nReply">·</div><div class="l">Need reply</div></div>
    <div class="stat t"><div class="n"><span id="nDone">0</span>/<span id="nTask">·</span></div><div class="l">Tasks done</div></div>
    <div class="stat a"><div class="n" id="nArc">·</div><div class="l">To archive</div></div>
  </div>
  <div class="tabs">
    <button class="tab" aria-selected="true" data-p="reply">Needs reply</button>
    <button class="tab" aria-selected="false" data-p="task">Your tasks</button>
    <button class="tab" aria-selected="false" data-p="away">Put away</button>
  </div>
  <div class="pane on" id="p-reply"></div>
  <div class="pane" id="p-task"></div>
  <div class="pane" id="p-away"></div>
</div>
<div id="toast"></div>
<script>
const AN={personal:"personal",support:"support",alyssa:"alyssa@ca",wellness:"wellness"};
let D={};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
let tT;function toast(m,err){const t=$("#toast");t.textContent=m;t.classList.toggle("err",!!err);t.classList.add("show");clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),3000);}
async function api(path,body){const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});const j=await r.json();if(!r.ok||j.error)throw new Error(j.error||r.statusText);return j;}

function render(){
  $("#sub").textContent=`4 inboxes · updated ${D.generated||""}`;
  $("#nReply").textContent=D.replies.length;
  $("#nTask").textContent=D.tasks.length;
  $("#p-reply").innerHTML=`<div class="keepnote"><b>Already replied — cleared:</b> Breannah, Jennifer, Natalie.</div>`+
    D.replies.map((r,i)=>`<div class="card reply"><div style="display:flex;gap:8px;align-items:baseline"><span class="who">${esc(r.who)}</span><span class="acct ${r.acct}">${AN[r.acct]}</span></div><p class="subj">${esc(r.subj)}</p><div style="margin-top:8px"><button class="btn" data-draft="${i}">${esc(r.tag)} this →</button></div></div>`).join("");
  $("#p-task").innerHTML=D.tasks.map(t=>`<div class="card task" data-t="${t.id}"><div style="display:flex;gap:8px;align-items:baseline"><span class="who">${esc(t.who)}</span><span class="acct ${t.acct}">${AN[t.acct]}</span></div><p class="note">${esc(t.note)}</p><label style="display:flex;gap:8px;align-items:center;margin-top:9px;cursor:pointer"><input type="checkbox" class="tick" data-done="${t.id}"><span class="lbl">Mark done</span></label></div>`).join("");
  let a=`<div class="keepnote"><b>Checked = archive it.</b> Uncheck what to keep, then hit a button — it archives live (inbox only, never deleted).</div>`;
  for(const k of Object.keys(D.away)){
    a+=`<div class="blk" data-blk="${k}"><div class="blkh"><span class="acct ${k}">${AN[k]}</span><b>${esc(k)}</b><a class="lbl" href="https://mail.google.com/mail/u/?authuser=${D.accounts[k]}#inbox" target="_blank">inbox ↗</a></div>`+
      D.away[k].map(r=>`<label class="row"><input type="checkbox" checked data-id="${r[2]}"><span style="flex:1;min-width:0"><span class="rs">${esc(r[1])}</span><span class="rf">${esc(r[0])}</span></span></label>`).join("")+
      `<div style="padding-top:10px"><button class="btn ghost" data-arc="${k}">Archive checked <span data-c="${k}"></span> →</button></div></div>`;
  }
  $("#p-away").innerHTML=a;counts();
}
function chk(k){return $$(`[data-blk="${k}"] input[data-id]`).filter(b=>b.checked);}
function counts(){let tot=0;for(const k of Object.keys(D.away)){const n=chk(k).length;tot+=n;const e=$(`[data-c="${k}"]`);if(e)e.textContent="("+n+")";}$("#nArc").textContent=tot;}

document.addEventListener("click",async e=>{
  const tab=e.target.closest(".tab");
  if(tab){$$(".tab").forEach(x=>x.setAttribute("aria-selected","false"));tab.setAttribute("aria-selected","true");$$(".pane").forEach(p=>p.classList.remove("on"));$("#p-"+tab.dataset.p).classList.add("on");return;}
  const d=e.target.closest("[data-draft]");
  if(d){const r=D.replies[+d.dataset.draft];d.disabled=true;d.textContent="writing…";try{await api("/api/draft",{email:D.accounts[r.acct],threadId:r.threadId,instruction:r.instruction});toast("Draft saved to your Gmail drafts ✓");d.textContent="drafted ✓";}catch(err){toast("Draft failed: "+err.message,true);d.disabled=false;d.textContent=r.tag+" this →";}return;}
  const b=e.target.closest("[data-arc]");
  if(b){const k=b.dataset.arc;const boxes=chk(k);if(!boxes.length){toast("Nothing checked here");return;}const ids=boxes.map(x=>x.dataset.id);b.disabled=true;b.textContent="archiving…";try{await api("/api/archive",{email:D.accounts[k],ids});boxes.forEach(x=>x.closest(".row").remove());toast(`Archived ${ids.length} from ${AN[k]} ✓`);counts();}catch(err){toast("Archive failed: "+err.message,true);b.disabled=false;}return;}
});
document.addEventListener("change",e=>{
  const done=e.target.closest("[data-done]");
  if(done){done.closest(".card").classList.toggle("done",done.checked);done.nextElementSibling.textContent=done.checked?"Done":"Mark done";$("#nDone").textContent=$$(".tick:checked").length;return;}
  if(e.target.dataset.id){e.target.closest(".row").classList.toggle("keep",!e.target.checked);counts();}
});

fetch("/api/inbox").then(r=>r.json()).then(d=>{D=d;render();}).catch(e=>toast("Couldn't load inbox: "+e,true));
</script>
</body>
</html>
