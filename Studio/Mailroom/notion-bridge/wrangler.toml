# Cloudflare Worker config for the Mailroom Notion -> Gmail bridge.
# DRAFT / NOT DEPLOYED. See SETUP.md for the deploy + secrets steps.
#
# Secrets are NOT stored here. They are set with `wrangler secret put` by
# Alyssa herself (never committed, never entered by an agent):
#   WEBHOOK_SECRET     shared secret; must match the Notion button header
#   NOTION_TOKEN       internal integration token (read row + set Status)
#   COMPOSIO_API_KEY   Gmail archive + create-draft actions
#   ANTHROPIC_API_KEY  draft copy in her voice

name = "mailroom-bridge"
main = "worker.js"
compatibility_date = "2026-01-01"

workers_dev = true

# No plaintext vars. Everything sensitive is a secret (see above).
[vars]
# (intentionally empty — do not put secrets here)

# --- HIGH-1: rate limiting (Vex audit) ---------------------------------------
# Native Rate Limiting binding = the burst cap. ~30 requests / 60s over a
# single fixed "global" bucket, checked in worker.js after auth, before work.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"          # arbitrary unique id for this limiter
simple = { limit = 30, period = 60 }

# KV counter = the hourly DRAFT cap (each draft is an Opus call + Gmail write).
# Create the namespace once: `wrangler kv namespace create MAILROOM_KV`, then
# paste the printed id below before deploying.
[[kv_namespaces]]
binding = "MAILROOM_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
