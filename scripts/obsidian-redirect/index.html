<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening in Obsidian</title>
<style>
  body { font-family: -apple-system, Segoe UI, sans-serif; background: #faf6f0; color: #3d3a34;
         display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
  .card { text-align: center; padding: 2.5rem 3rem; background: #fffdf9; border: 1px solid #e8e0d3;
          border-radius: 12px; max-width: 26rem; }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 .5rem; }
  p { font-size: .9rem; color: #8a8375; margin: .25rem 0 1.25rem; word-break: break-word; }
  a.btn { display: inline-block; padding: .55rem 1.2rem; border-radius: 8px; background: #3d3a34;
          color: #fffdf9; text-decoration: none; font-size: .9rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Opening in Obsidian</h1>
  <p id="note"></p>
  <a class="btn" id="open" href="#">Open the note</a>
</div>
<script>
  var q = new URLSearchParams(location.search);
  var vault = q.get("v") || "the-house";
  var file = q.get("f") || "";
  var uri = "obsidian://open?vault=" + encodeURIComponent(vault) + "&file=" + encodeURIComponent(file);
  document.getElementById("note").textContent = decodeURIComponent(file) || "No note given.";
  document.getElementById("open").href = uri;
  if (file) { location.href = uri; }
</script>
</body>
</html>
